name: HolyClaude — Build & Push to Docker Hub + GHCR

run-name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.workflow }}

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/sumeramartin/holyclaude

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      max-parallel: 1
      matrix:
        # On v*-android-rc* tags, only build the android variant. This lets
        # us iterate on android RCs without re-publishing slim/full.
        variant: ${{ fromJSON(contains(github.ref_name, '-android-rc') && '["android"]' || '["slim","full","android"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free up disk space
        run: |
          # Aggressive cleanup — the android variant is on the disk-budget
          # cliff (~7.5 GB peak per arch) so the standard slim/full cleanup
          # is no longer enough. Frees ~10-14 GB on ubuntu-latest.
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /opt/microsoft \
            /opt/google \
            /imagegeneration
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile
          sudo apt-get clean
          docker system prune -af
          df -h

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
          # latest=false suppresses the implicit `:latest` and `{{major}}`
          # auto-emission so the tag rules below are the only source of
          # truth. Prevents accidental :latest collisions when adding
          # variants in the future.
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ matrix.variant == 'full' }}
            type=raw,value=slim,enable=${{ matrix.variant == 'slim' }}
            type=raw,value=android,enable=${{ matrix.variant == 'android' }}
            type=semver,pattern={{version}},enable=${{ matrix.variant == 'full' }}
            type=semver,pattern={{version}}-slim,enable=${{ matrix.variant == 'slim' }}
            type=semver,pattern={{version}}-android,enable=${{ matrix.variant == 'android' }}

      # ----------------------------------------------------------------
      # Android variant: smoke test BEFORE push.
      # We do a single-arch (amd64) load:true build into the local docker
      # daemon, run a few sanity commands inside the loaded image, and
      # only then proceed to the multi-arch push. This catches "image
      # built but tooling broken" failures BEFORE we ship them.
      # cache-to mode=min for android (not mode=max) to keep the GHA
      # cache under quota — three variants × two archs × mode=max blows
      # the 10 GB GHA cache budget.
      # ----------------------------------------------------------------
      - name: Build (load for smoke test, amd64 only)
        if: matrix.variant == 'android'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: holyclaude:android-smoketest
          build-args: |
            VARIANT=android
          cache-from: type=gha,scope=android
          cache-to: type=gha,mode=min,scope=android

      - name: Smoke test android image
        if: matrix.variant == 'android'
        run: |
          docker run --rm holyclaude:android-smoketest bash -c '
            set -euo pipefail
            test "$(cat /etc/holyclaude-variant)" = "android"
            test -f /etc/holyclaude-img-arch
            java -version
            adb --version
            emulator -version | head -1
            sdkmanager --list_installed | grep -E "platforms;android-34|build-tools;34"
            sdkmanager --list_installed | grep -E "system-images;android-34;google_apis"
            test -d /opt/android-sdk-avd-seed/phone34.avd
            test -f /usr/local/share/holyclaude/claude-memory-android.md
            test -x /usr/local/bin/holyclaude-info
            test -x /usr/local/bin/holyclaude-android-up
            test -x /usr/local/bin/holyclaude-android-down
            test -x /usr/local/bin/holyclaude-android-run
            stat -c "%a" /usr/bin/bwrap | grep -q 4755    # bwrap setuid not regressed
            ! pgrep -x pulseaudio                          # pulseaudio daemon NOT started
          '

      - name: Disk usage before multi-arch push
        if: always()
        run: df -h

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          # android variant is amd64-only: Google ships no official ARM64
          # Linux SDK tools (no emulator, adb, aapt2 — see issuetracker
          # #227219818), and KVM acceleration of an x86_64 emulator
          # requires an x86_64 container anyway. slim/full stay multi-arch.
          platforms: ${{ matrix.variant == 'android' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VARIANT=${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          # mode=max for slim/full (cache everything for fast incremental
          # rebuilds). mode=min for android because the layer is too big
          # to fit alongside slim/full in the GHA cache budget.
          cache-to: type=gha,mode=${{ matrix.variant == 'android' && 'min' || 'max' }},scope=${{ matrix.variant }}

      - name: Disk usage after push
        if: always()
        run: df -h

